<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMBR — Calculadora de Calorías</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🔥</span>
        <h1>EMBR</h1>
      </div>
      <p class="subtitle">Calcula las calorías quemadas en tu actividad</p>
    </header>

    <main class="main">
      <!-- Weight Card -->
      <section class="card card-weight" id="weight-section">
        <div class="card-header">
          <span class="card-icon">⚖️</span>
          <h2>Tu peso</h2>
        </div>
        <div class="weight-input-group">
          <div class="input-wrapper">
            <input type="number" id="weight" min="20" max="300" step="0.1" placeholder="70">
            <span class="input-suffix">kg</span>
          </div>
          <button class="btn-save" id="save-weight" title="Guardar peso">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </button>
        </div>
        <p class="weight-status" id="weight-status"></p>
      </section>

      <!-- Activity Card -->
      <section class="card card-activity">
        <div class="card-header">
          <span class="card-icon">🏃</span>
          <h2>Actividad</h2>
        </div>

        <div class="form-group">
          <label for="distance">Distancia</label>
          <div class="input-wrapper">
            <input type="number" id="distance" min="0.1" step="0.01" placeholder="5.0">
            <span class="input-suffix">km</span>
          </div>
        </div>

        <div class="form-group">
          <label>Tiempo</label>
          <div class="time-toggle">
            <button class="toggle-btn active" data-mode="minutes" id="btn-minutes">Minutos</button>
            <button class="toggle-btn" data-mode="hhmm" id="btn-hhmm">HH:MM</button>
          </div>
          <div class="input-wrapper" id="time-minutes-wrapper">
            <input type="number" id="time-minutes" min="1" step="1" placeholder="30">
            <span class="input-suffix">min</span>
          </div>
          <div class="input-wrapper hidden" id="time-hhmm-wrapper">
            <input type="text" id="time-hhmm" placeholder="0:30" maxlength="5" inputmode="numeric">
            <span class="input-suffix">h:min</span>
          </div>
        </div>

        <button class="btn-calculate" id="calculate">
          <span>Calcular calorías</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
      </section>

      <!-- Results Card -->
      <section class="card card-results hidden" id="results-section">
        <div class="card-header">
          <span class="card-icon">📊</span>
          <h2>Resultados</h2>
        </div>

        <div class="result-main">
          <span class="result-number" id="result-calories">0</span>
          <span class="result-unit">kcal</span>
        </div>

        <div class="result-details">
          <div class="detail-item">
            <span class="detail-label">Velocidad media</span>
            <span class="detail-value" id="result-speed">—</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Ritmo</span>
            <span class="detail-value" id="result-pace">—</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">MET estimado</span>
            <span class="detail-value" id="result-met">—</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Tipo de actividad</span>
            <span class="detail-value" id="result-activity">—</span>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Fórmula: Calorías = Tiempo(min) &times; (MET &times; 3.5 &times; Peso) / 200</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
