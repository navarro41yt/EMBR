<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMBR — Calculadora de Calorías</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <script>
    // Apply theme early to prevent flash of wrong theme
    (function() {
      var t = localStorage.getItem('embr_theme') ||
        (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <span class="logo-icon">🔥</span>
          <h1>EMBR</h1>
        </div>
        <div class="header-controls">
          <button class="btn-progress" id="open-progress" data-i18n-title="progress.openProgress">🌍</button>
          <select class="lang-select" id="lang-select" data-i18n-title="lang.select"></select>
          <button class="btn-theme" id="theme-toggle" data-i18n-title="theme.toggle">
            <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          </button>
        </div>
      </div>
      <p class="subtitle" data-i18n="header.subtitle">Calcula las calorías quemadas en tu actividad</p>
    </header>

    <main class="main">
      <!-- Weight Card -->
      <section class="card card-weight" id="weight-section">
        <div class="card-header">
          <span class="card-icon">⚖️</span>
          <h2 data-i18n="weight.title">Tu peso</h2>
        </div>
        <div class="weight-input-group">
          <div class="input-wrapper">
            <input type="number" id="weight" min="20" max="300" step="0.1" placeholder="70">
            <span class="input-suffix" data-i18n="weight.suffix">kg</span>
          </div>
          <button class="btn-save" id="save-weight" data-i18n-title="weight.save">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </button>
        </div>
        <p class="weight-status" id="weight-status"></p>
      </section>

      <!-- Activity Card -->
      <section class="card card-activity">
        <div class="card-header">
          <span class="card-icon">🏃</span>
          <h2 data-i18n="activity.title">Actividad</h2>
        </div>

        <div class="form-group">
          <label for="distance" data-i18n="activity.distance">Distancia</label>
          <div class="input-wrapper">
            <input type="number" id="distance" min="0.1" step="0.01" placeholder="5.0">
            <span class="input-suffix" data-i18n="activity.distanceSuffix">km</span>
          </div>
        </div>

        <div class="form-group">
          <label data-i18n="activity.time">Tiempo</label>
          <div class="time-toggle">
            <button class="toggle-btn active" data-mode="minutes" id="btn-minutes" data-i18n="activity.minutes">Minutos</button>
            <button class="toggle-btn" data-mode="hhmm" id="btn-hhmm" data-i18n="activity.hhmm">HH:MM</button>
          </div>
          <div class="input-wrapper" id="time-minutes-wrapper">
            <input type="number" id="time-minutes" min="1" step="1" placeholder="30">
            <span class="input-suffix" data-i18n="activity.minutesSuffix">min</span>
          </div>
          <div class="input-wrapper hidden" id="time-hhmm-wrapper">
            <input type="text" id="time-hhmm" placeholder="0:30" maxlength="5" inputmode="numeric">
            <span class="input-suffix" data-i18n="activity.hhmmSuffix">h:min</span>
          </div>
        </div>

        <button class="btn-calculate" id="calculate">
          <span data-i18n="activity.calculate">Calcular calorías</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
      </section>

      <!-- Results Card -->
      <section class="card card-results hidden" id="results-section">
        <div class="card-header">
          <span class="card-icon">📊</span>
          <h2 data-i18n="results.title">Resultados</h2>
        </div>

        <div class="result-main">
          <span class="result-number" id="result-calories">0</span>
          <span class="result-unit" data-i18n="results.unit">kcal</span>
          <p class="motivational-msg" id="motivational-msg"></p>
        </div>

        <!-- Food equivalence -->
        <div class="result-equivalence" id="result-equivalence"></div>

        <div class="result-details">
          <div class="detail-item">
            <span class="detail-label" data-i18n="results.speed">Velocidad media</span>
            <span class="detail-value" id="result-speed">—</span>
          </div>
          <div class="detail-item">
            <span class="detail-label" data-i18n="results.pace">Ritmo</span>
            <span class="detail-value" id="result-pace">—</span>
          </div>
          <div class="detail-item">
            <span class="detail-label" data-i18n="results.met">MET estimado</span>
            <span class="detail-value" id="result-met">—</span>
          </div>
          <div class="detail-item">
            <span class="detail-label" data-i18n="results.activityType">Tipo de actividad</span>
            <span class="detail-value" id="result-activity">—</span>
          </div>
        </div>
      </section>

      <!-- History Card -->
      <section class="card card-history hidden" id="history-section">
        <div class="card-header">
          <span class="card-icon">🕐</span>
          <h2 data-i18n="history.title">Historial reciente</h2>
          <button class="btn-clear-history" id="clear-history" data-i18n-title="history.clear">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          </button>
        </div>
        <div class="history-list" id="history-list"></div>
      </section>
    </main>

    <footer class="footer">
      <p data-i18n="footer.formula">Fórmula: Calorías = Tiempo(min) × (MET × 3.5 × Peso) / 200</p>
    </footer>
  </div>

  <!-- Progress Modal -->
  <div class="progress-overlay hidden" id="progress-overlay">
    <div class="progress-modal">
      <div class="progress-modal-header">
        <h2><span>🌍</span> <span data-i18n="progress.title">Progreso Global</span></h2>
        <button class="btn-close-progress" id="close-progress">&times;</button>
      </div>
      <div class="progress-summary">
        <div class="progress-total-km" id="progress-total-km">0 km</div>
        <div class="progress-level-badge" id="progress-level-badge"></div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progress-bar-fill"></div>
        </div>
        <div class="progress-remaining" id="progress-remaining"></div>
      </div>
      <div class="progress-levels" id="progress-levels"></div>
    </div>
  </div>

  <!-- Level-up toast -->
  <div class="levelup-toast hidden" id="levelup-toast">
    <span class="levelup-icon">🎉</span>
    <span class="levelup-text" id="levelup-text"></span>
  </div>

  <!-- i18n engine + language files (loaded before app) -->
  <script src="i18n.js"></script>
  <script src="lang/es.js"></script>
  <script src="lang/en.js"></script>
  <script src="lang/pt.js"></script>
  <script src="lang/ja.js"></script>

  <script src="app.js"></script>
</body>
</html>
